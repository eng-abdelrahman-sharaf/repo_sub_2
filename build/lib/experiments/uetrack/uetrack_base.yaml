DATA:
  MAX_SAMPLE_INTERVAL: 200
  MULTI_MODAL_LANGUAGE: True
  MULTI_MODAL_VISION: True
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  SEARCH:
    CENTER_JITTER: 3.5
    FACTOR: 4.0
    SCALE_JITTER: 0.5
    SIZE: 224
    NUMBER: 1
  STD:
  - 0.229
  - 0.224
  - 0.225
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 112
    NUMBER: 1
  TRAIN:
    DATASETS_NAME: ["UAVPL"]
    DATASETS_RATIO: [1]
    SAMPLE_PER_EPOCH: 5000 # or 10000 if you want longer epochs
    NUM_WORKER: 2
  USE_NLP:
    TNL2K: True
    OTB99_LANG: True
MODEL:
  ENCODER:
    TYPE: fastitpnt_layer6
    STRIDE: 16
    PRETRAIN_TYPE: './fast_itpn_tiny_1600e_1k.pt' # The pretrained backbone path.
    PATCHEMBED_INIT: halfcopy
    DROP_PATH: 0.1
    TOKEN_TYPE_INDICATE: True
    NUM_EXPERT: 8
    MOE_LAYER: [5]
  TEXT_ENCODER:
    TYPE: ViT-L/14
  DECODER:
    TYPE: CENTER
    NUM_CHANNELS: 256
    CONV_TYPE: normal
    XAVIER_INIT: True
  TASK_DECODER:
    NUM_CHANNELS: 256
    FEATURE_TYPE: average
  TASK_NUM: 5
  TASK_INDEX:
    VASTTRACK: 0
    LASOT: 0
    TRACKINGNET: 0
    GOT10K: 0
    COCO: 0
    TNL2K: 1
    OTB99_LANG: 1
    DEPTHTRACK: 2
    LASHER: 3
    VISEVENT: 4
    UAVPL: 0
TRAIN:
  TYPE: text_frozen
  ENCODER_MULTIPLIER: 0.1
  BATCH_SIZE: 16
  EPOCH: 500
  GRAD_CLIP_NORM: 0.1
  LR: 0.0001
  LR_DROP_EPOCH: 400
  NUM_WORKER: 2
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  WEIGHT_DECAY: 0.0001
  #distill setting
  TEMPERATURE: 3.0
  TEACHER_TYPE: fastitpnb
  DISTILL_LAYER_T: [24]
  DISTILL_LAYER_S: [6]
  TEACHER_PATH: "./checkpoints/train/SUTRACK_ep0300.pth.tar"
  KD_WEIGHT: 5.0
  FEAT_WEIGHT: 0.002
  FEAT_HEAD_WEIGHT: 1.0
  RESUME_PATH: "./checkpoints/train/uetrack/uetrack_base/uetrack_base.tar"
TEST:
  EPOCH: 9999
  SEARCH_FACTOR: 4.0
  SEARCH_SIZE: 224
  TEMPLATE_FACTOR: 2.0
  TEMPLATE_SIZE: 112
  WINDOW: True
  MULTI_MODAL_VISION:
    DEFAULT: True
  MULTI_MODAL_LANGUAGE:
    DEFAULT: False
  USE_NLP:
    DEFAULT: False
    TNL2K: True

